scopes:
    boat:
        label: Boat
        modelClass: Noren\Booking\Models\Boat
        conditions: boat_id in (:value)
        nameFrom: amo_name

    type:
        label: Type
        type: group
        scope: filterType
        options:
            1: Shared
            2: Private
            3: Manual
            4: Auto
            empty: Manual 2


    date:
        label: Date
        type: date
        conditions:
            before: date <= :value
            after: date > :value
            between: date >= :after AND date <= :before