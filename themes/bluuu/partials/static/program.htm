<div class="bg-white rounded-3 p-xl-1 p-3 shadow">
    <div class="row justify-content-between ">
        <div class="col-xxl-5 col-xl-6">
        {%if tour.types_id!=1%}
            <div class="d-inline-flex bg-blue-50 px-4 py-3 lh-1 rounded-3 fw-600 mb-5">
                Modify anytime
            </div>
            {%endif%}
            <div class="fz-15 lh-1 fw-600">Itinerary</div>
            <div class="mt-3 c-500">{{program.description|raw}}</div>
            <table class="itinerary-table fw-600 mt-5">
                <thead>
                    <tr class="fz-12">
                       
                        <th class="text-left pe-4">Time</th>
                        <th class="text-left">Activity</th>
                    </tr>
                </thead>
                <tbody class="fz-1">
                    {%for i in program.list %}
                    <tr>
                       
                        <td class="pe-3">
                            <div class="text-nowrap">{{i.time}}</div>
                            <div class="text-nowrap fz-09 c-500 fw-400">{{i.duration}}</div>
                        </td>
                        <td>
                            <div class="d-flex">
                                <div class="flex-shrink">
                                    <img src="{{i.icon|media}}" alt="icon{{loop.index}}" class="wh-25">
                                </div>
                                <div class="ms-2">
                                    <div>{{i.title|raw}}</div>
                                    <div class="fz-09 c-500 fw-400">{{i.description}}</div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    {%endfor%}
                </tbody>
            </table>
        </div>
        <div class="col-xxl-5 col-xl-6 mt-xl-0 mt-4 align-self-end">
            <img src="{{'assets/images/map.webp'|theme}}" alt="program" class="w-100">
        </div>
    </div>
</div>
