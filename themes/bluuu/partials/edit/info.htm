<div class="bg-white rounded-1 shadow p-4">
        <ul class="c-500">
            <li class="d-flex pt-2">
                <div class="flex-grow-1" >Date</div>
                <span class="ms-2">
                    <format-date :date="order.travel_date"></format-date>
                </span>
            </li>
            <li class="d-flex pt-2">
                <div class=" flex-grow-1">Passengers</div>
                <div><span class="ms-2" v-text="membersView"></span></div>
            </li>
        </ul>
        <div class="border-dashed-bottom mt-3"></div>
        <div class="d-flex pt-2">
            <div class="flex-grow-1 fw-600 c-950">Price details</div>
        </div>
        <ul class="c-500 fz-09">
            <div class="d-flex pt-2">
                <div class="flex-grow-1">Tour Price</div>
                <div>
                    <format-number :number="order.tour_price+order.boat_price"></format-number>
                </div>
            </div>
            <li class="d-flex pt-2 ">
                <div class="flex-grow-1" v-text="program.name"></div>
                <div v-if="order.program_price==0">Included</div>
                <div v-else>
                    <format-number :number="order.program_price"></format-number>
                </div>
            </li>
            <li class="d-flex pt-2 " v-if="order.transfer_id">
                <div class="flex-grow-1" v-text="transfer.name"></div>
                <div>
                    <format-number :number="order.transfer_price"></format-number>
                </div>
            </li>
            <li class="d-flex pt-2 " v-if="order.cover_id">
                <div class="flex-grow-1" v-text="cover.name"></div>
                <div>
                    <format-number :number="order.cover_price"></format-number>
                </div>
            </li>
            <li class="d-flex pt-2 " v-for="extras in order.extras">
                <div class="flex-grow-1" v-text="extras.name+' x '+extras.qty"></div>
                <div v-if="extras.price==0">Free</div>
                <div v-else>
                    <format-number :number="extras.qty*extras.price"></format-number>
                </div>
                <i class="ms-2 remove-icon pointer" v-on:click="removeExtras(extras.id)"></i>
            </li>
        </ul>
        <div class="border-dashed-bottom mt-3"></div>
        <ul>
            <li class="d-flex pt-2 c-green" v-if="order.discount">
                <div class="flex-grow-1" v-text="'Discount ' + order.discount + '%'"></div>
                <div>
                    <format-number :number="order.discount_price"></format-number>
                </div>
            </li>
            <li class="d-flex pt-2 fw-600 c-950">
                <div class="flex-grow-1">Total</div>
                <div>
                    <format-number :number="order.total_price"></format-number>
                </div>
            </li>
            <li class="d-flex pt-2 fw-600 fz-09 c-500">
                <div class="flex-grow-1">Paid</div>
                <div>
                    <format-number :number="order.deposite_summ"></format-number>
                </div>
            </li>
            <li class="d-flex pt-2 fw-600 fz-09 c-500" v-if="order.total_price-order.deposite_summ>0">
                <div class="flex-grow-1">Due to pay</div>
                <div>
                    <format-number :number="order.total_price-order.deposite_summ"></format-number>
                </div>
            </li>
            <li class="d-flex pt-2 fw-600 fz-09 c-500" v-else-if="order.total_price-order.deposite_summ<0">
                <div class="flex-grow-1">Refund Due</div>
                <div>
                    <format-number :number="order.deposite_summ-order.total_price"></format-number>
                </div>
            </li>

        </ul>

        <div class="border-dashed-bottom mt-3"></div>
        <div class="row" v-if="hasChanges">
            <div class="col-xl mt-3">
                <div class="btn btn-orange w-100" v-if="redirect==false" @click="cahngeOrder">Save changes</div>

                <button class="btn btn-light" disabled v-else>
                    <span class="me-2">Please wait </span>
                    <span class="preloading1">·</span>
                    <span class="preloading2">·</span>
                    <span class="preloading3">·</span>
                </button>

            </div>
            <div class="col-xl mt-3">
                <div class="btn btn-outline w-100" @click="resetChanges">Cancel changes</div>
            </div>
            
        </div>
</div>
