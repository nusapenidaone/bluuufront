<div class="row justify-content-center">
    <div class="col-xl-10">
        <div class="bg-white border-black-10 p-xl-1 p-4 rounded-15">
            <div class="row gx-2 align-items-center">
                <div class="col-auto">
                    <i class="promocode-icon fz-15"></i>
                </div>
                <div class="col">
                    <div class="fw-600 ms-2 ttu c-500" v-text="order.external_id"></div>
                </div>
                <div class="col-auto">
                    <div class="c-500 tdu c-950-hover pointer" data-fancybox data-src="#cancelOrder">Cancel tour</div>
                </div>
            </div>
            <div class="h-1 mt-3 bg-black-10"></div>
            <div class="row gx-xl-4">
                <div class="col-xl-5 mt-3">
                    <div class="rounded-1 oh img">
                        <boat-slider :images="tour.images_with_thumbs.slice(0, 6)" :more="true" />
                    </div>
                </div>
                <div class="col-xl-7 mt-3">
                    <div class="d-flex">
                        <div class="c-950 fw-600" v-text="tour.name"></div>
                    </div>
                    <ul class="c-500">
                        <li class="d-flex pt-2">
                            <div class="flex-grow-1" >Date</div>
                            <span class="ms-2">
                                <format-date :date="order.travel_date"></format-date>
                            </span>
                        </li>
                        <li class="d-flex pt-2">
                            <div class=" flex-grow-1">Passengers</div>
                            <div><span class="ms-2" v-text="membersView"></span></div>
                        </li>
                    </ul>
                    <div class="border-dashed-bottom mt-3"></div>
                    <div class="d-flex pt-2">
                        <div class="flex-grow-1 fw-600 c-950">Price details</div>
                    </div>
                    <ul class="c-500 fz-09">
                        <div class="d-flex pt-2">
                            <div class="flex-grow-1">Tour Price</div>
                            <div>
                                <format-number :number="order.tour_price+order.boat_price"></format-number>
                            </div>
                        </div>
                        <li class="d-flex pt-2 ">
                            <div class="flex-grow-1" v-text="program.name"></div>
                            <div v-if="order.program_price==0">Included</div>
                            <div v-else>
                                <format-number :number="order.program_price"></format-number>
                            </div>
                        </li>
                        <li class="d-flex pt-2 " v-if="order.transfer_id">
                            <div class="flex-grow-1" v-text="transfer.name"></div>
                            <div>
                                <format-number :number="order.transfer_price"></format-number>
                            </div>
                        </li>
                        <li class="d-flex pt-2 " v-if="order.cover_id">
                            <div class="flex-grow-1" v-text="cover.name"></div>
                            <div>
                                <format-number :number="order.cover_price"></format-number>
                            </div>
                        </li>
                        <li class="d-flex pt-2 " v-for="extras in order.extras">
                            <div class="flex-grow-1" v-text="extras.name+' x '+extras.qty"></div>
                            <div v-if="extras.price==0">Free</div>
                            <div v-else>
                                <format-number :number="extras.qty*extras.price"></format-number>
                            </div>
                        </li>
                    </ul>
                    <div class="border-dashed-bottom mt-3"></div>
                    <ul>
                        <li class="d-flex pt-2 c-green" v-if="order.discount">
                            <div class="flex-grow-1" v-text="'Discount ' + order.discount + '%'"></div>
                            <div>
                                <format-number :number="order.discount_price"></format-number>
                            </div>
                        </li>
                        <li class="d-flex pt-2 fw-600 c-950">
                            <div class="flex-grow-1">Total</div>
                            <div>
                                <format-number :number="order.total_price"></format-number>
                            </div>
                        </li>
                        <li class="d-flex pt-2 fw-600 fz-09 c-500">
                            <div class="flex-grow-1">Paid</div>
                            <div>
                                <format-number :number="order.deposite_summ"></format-number>
                            </div>
                        </li>
                        <li class="d-flex pt-2 fw-600 fz-09 c-500" v-if="order.total_price-order.deposite_summ>0">
                            <div class="flex-grow-1">Due to pay</div>
                            <div>
                                <format-number :number="order.total_price-order.deposite_summ"></format-number>
                            </div>
                        </li>
                    </ul>
                    <div class="border-dashed-bottom mt-3"></div>
                    <div class="row gx-2 justify-content-end">
                        <div class="col-xl-auto col mt-3">
                            <div class="btn btn-outline w-100" @click="step=2">Edit tour</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="bg-white border-black-10 p-xl-1 p-4 rounded-15 mt-4">
            <div class="fw-600 c-950 fz-12 border-dashed-bottom pb-3">Booking details</div>
            <div class="border-dashed-bottom py-3">
                <div class="d-flex align-items-center">
                    <img src="/themes/bluuu/assets/icons/schedule-icon.svg" class="wh-1">
                    <div class="ms-2 fw-600 c-950">Itinerary</div>
                </div>
                <template v-for="(l, index) in program.list" :key="index">
                    <div class="mt-2 fz-09">
                        <span class="c-950 fw-600" v-text="l.time + ' ('+ l.duration+')' "></span> -
                        <span class="c-500" v-html="l.title"></span>
                    </div>
                </template>
            </div>
            <div class="border-dashed-bottom py-3" v-if="order.restaurant_id">
                <div class="d-flex align-items-center">
                    <img src="/themes/bluuu/assets/icons/restaurant-icon.svg" class="wh-1">
                    <div class="ms-2 fw-600 c-950" v-text="restaurant.name"></div>
                </div>
                <div class="fz-09 mt-2 c-500" v-html="restaurant.description"></div>
            </div>
            <div class="border-dashed-bottom py-3">
                <div class="d-flex align-items-center">
                    <img src="/themes/bluuu/assets/icons/transfer-icon.svg" class="wh-1">
                    <div class="ms-2 fw-600 c-950">Meeting and pick up</div>
                </div>
                <div class="fz-09 mt-2 c-500 content" v-html="tour.meeting.text"></div>
            </div>
            <div class="border-dashed-bottom py-3">
                <div class="d-flex align-items-center">
                    <img src="/themes/bluuu/assets/icons/included-icon.svg" class="wh-1">
                    <div class="ms-2 fw-600 c-950">Includes</div>
                </div>
                <div class="row g-2 mt-2">
                    <template v-for="(item, index) in tour.includes" :key="index">
                        <div class="col-auto">
                            <div class="px-3 py-2 rounded-3 bg-100 fz-09 c-950" v-text="item.name">

                            </div>
                        </div>
                    </template>
                </div>
            </div>
            <div class="border-dashed-bottom py-3">
                <div class="d-flex align-items-center">
                    <img src="/themes/bluuu/assets/icons/additional-icon.svg" class="wh-1">
                    <div class="ms-2 fw-600 c-950">Additional info</div>
                </div>
                <div class="fz-09 mt-2 c-500 content" v-html="tour.additional.text"></div>
            </div>
            <div class="pt-3">
                <div class="d-flex align-items-center">
                    <img src="/themes/bluuu/assets/icons/cancelation-icon.svg" class="wh-1">
                    <div class="ms-2 fw-600 c-950">Cancelation</div>
                </div>
                <div class="fz-09 mt-2 c-500 content" v-html="tour.cancelation.text"></div>
            </div>
        </div>
    </div>
</div>
