{% verbatim %}
<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ─── Constants ────────────────────────────────────────────────────────────────
const TOKEN_KEY = 'bluuu_admin_token';
const API_KEY   = 'e4f3b1a9c2d8e7f6a1b2c3d4e5f67890';

const INPUT  = 'bg-white border border-slate-300 text-slate-800 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-blue-400';
const SELECT = 'bg-white border border-slate-300 text-slate-800 rounded-lg px-2.5 py-1.5 text-sm outline-none';
const GLASS  = 'bg-white border border-slate-200 rounded-2xl shadow-sm';
const BTN    = 'bg-white border border-slate-200 text-slate-500 hover:text-slate-800 px-3 py-1.5 rounded-lg text-sm font-semibold transition-all shadow-sm';
const TH     = 'px-3 py-2.5 text-left text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-200 whitespace-nowrap bg-slate-50';
const TD     = 'px-3 py-2.5 border-b border-slate-100 align-top text-sm text-slate-700 whitespace-nowrap';

// ─── Helpers ─────────────────────────────────────────────────────────────────
const fmt = dt => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
const monthRange = (y, m) => ({ start: fmt(new Date(y, m, 1)), end: fmt(new Date(y, m+1, 0)) });
const now = new Date();

function todayBali() {
    return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Makassar' });
}
function baliOffset(n) {
    const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Makassar' }));
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function baliMonthRange(offset = 0) {
    const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Makassar' }));
    const y = d.getFullYear(), m = d.getMonth() + offset;
    const first = new Date(y, m, 1), last = new Date(y, m + 1, 0);
    return { start: fmt(first), end: fmt(last) };
}
function baliWeekRange() {
    const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Makassar' }));
    const day = d.getDay() || 7;
    const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    return { start: fmt(mon), end: fmt(sun) };
}
function fmtDisplayDate(ymd) {
    if (!ymd) return '';
    const [y, m, d] = ymd.split('-');
    return `${d}.${m}.${y}`;
}
function fmtMoney(v) {
    if (!v && v !== 0) return '—';
    return Number(v).toLocaleString('id-ID');
}
function fmtOdooDate(utcStr) {
    if (!utcStr) return '—';
    const d = new Date(utcStr.replace(' ', 'T') + 'Z');
    const date = d.toLocaleDateString('ru-RU', { timeZone: 'Asia/Makassar' });
    const time = d.toLocaleTimeString('en-GB', { timeZone: 'Asia/Makassar', hour: '2-digit', minute: '2-digit' });
    return `${date} ${time}`;
}
function isPrivate(o) {
    return (o.x_studio_tour_type || '').toLowerCase().includes('private');
}
function partnerName(o) {
    if (Array.isArray(o.partner_id)) return o.partner_id[1] || '—';
    return o.partner_id || o.local_name || '—';
}
function srcLabel(o) {
    const s = o.x_studio_source;
    return (!s || s === false) ? '' : String(s);
}
const statusCls = type => {
    if (type === 4) return 'bg-slate-300 text-slate-600';
    if (type === 1) return 'bg-blue-500 text-white';
    if (type === 2) return 'bg-violet-500 text-white';
    if (type === 3) return 'bg-red-500 text-white';
    return 'bg-emerald-400 text-white hover:bg-emerald-500';
};
const statusLabel = (type, records, capacity) => {
    if (type === 4) return 'AUTO';
    if (type === 1) {
        const pax = records.reduce((s, r) => s + (Number(r.qtty) || 0), 0);
        return capacity ? `${pax}/${capacity}` : `${pax}`;
    }
    if (type === 2) return 'CRM';
    if (type === 3) return 'BLOCK';
    return 'OPEN';
};

// ─── MiniCalendar ─────────────────────────────────────────────────────────────
function MiniCalendar({ value, onChange, rangeFrom, rangeTo }) {
    const parsed = value ? new Date(value + 'T00:00:00') : new Date();
    const [vy, setVy] = useState(parsed.getFullYear());
    const [vm, setVm] = useState(parsed.getMonth());

    const DAYS   = ['Mo','Tu','We','Th','Fr','Sa','Su'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const firstDay    = new Date(vy, vm, 1);
    const lastDay     = new Date(vy, vm + 1, 0);
    const startOffset = (firstDay.getDay() + 6) % 7;

    const cells = [];
    for (let i = 0; i < startOffset; i++) cells.push(null);
    for (let d = 1; d <= lastDay.getDate(); d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);

    const todayStr = todayBali();
    const prevMonth = () => vm === 0 ? (setVm(11), setVy(y => y - 1)) : setVm(m => m - 1);
    const nextMonth = () => vm === 11 ? (setVm(0),  setVy(y => y + 1)) : setVm(m => m + 1);

    return (
        <div className="p-3 w-[232px] select-none">
            <div className="flex items-center justify-between mb-2">
                <button onClick={prevMonth} className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 font-bold text-lg leading-none">‹</button>
                <span className="text-sm font-bold text-slate-700">{MONTHS[vm]} {vy}</span>
                <button onClick={nextMonth} className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 font-bold text-lg leading-none">›</button>
            </div>
            <div className="grid grid-cols-7 mb-1">
                {DAYS.map(d => <div key={d} className="text-center text-[10px] font-bold text-slate-400 py-0.5">{d}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-y-0.5">
                {cells.map((d, i) => {
                    if (!d) return <div key={i} />;
                    const dateStr    = `${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const isSelected = dateStr === value;
                    const isToday    = dateStr === todayStr;
                    const inRange    = rangeFrom && rangeTo && dateStr > rangeFrom && dateStr < rangeTo;
                    const isEdge     = dateStr === rangeFrom || dateStr === rangeTo;
                    let cls = 'w-full aspect-square flex items-center justify-center rounded-lg text-xs font-semibold cursor-pointer transition-colors ';
                    if (isSelected)     cls += 'bg-blue-600 text-white';
                    else if (isEdge)    cls += 'bg-blue-500 text-white';
                    else if (inRange)   cls += 'bg-blue-100 text-blue-700';
                    else if (isToday)   cls += 'text-blue-600 font-bold hover:bg-blue-50';
                    else                cls += 'text-slate-700 hover:bg-slate-100';
                    return <div key={i} className={cls} onClick={() => onChange(dateStr)}>{d}</div>;
                })}
            </div>
        </div>
    );
}

// ─── DatePicker ───────────────────────────────────────────────────────────────
function DatePicker({ value, onChange, rangeFrom, rangeTo, align = 'left' }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);

    useEffect(() => {
        if (!open) return;
        const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
    }, [open]);

    const handleChange = v => { onChange(v); setOpen(false); };

    return (
        <div className="relative" ref={ref}>
            <button onClick={() => setOpen(o => !o)}
                className={`px-4 py-2 text-sm font-bold transition-colors leading-none ${open ? 'text-blue-600 bg-blue-50' : 'text-slate-700 hover:bg-slate-50'}`}>
                {fmtDisplayDate(value)}
            </button>
            {open && (
                <div className={`absolute top-full mt-1.5 z-50 bg-white border border-slate-200 rounded-2xl shadow-xl ${align === 'right' ? 'right-0' : 'left-0'}`}>
                    <MiniCalendar value={value} onChange={handleChange} rangeFrom={rangeFrom} rangeTo={rangeTo} />
                </div>
            )}
        </div>
    );
}

// ─── DateRangeBar ─────────────────────────────────────────────────────────────
function DateRangeBar({ dateFrom, dateTo, onFrom, onTo, extraPresets, navPrev, navNext, trailing, loading }) {
    const [presetVal, setPresetVal] = useState('');
    const presets = [
        { label: 'Today',      fn: () => { const t = todayBali();       onFrom(t);       onTo(t);        } },
        { label: 'Tomorrow',   fn: () => { const t = baliOffset(1);     onFrom(t);       onTo(t);        } },
        { label: 'This week',  fn: () => { const r = baliWeekRange();   onFrom(r.start); onTo(r.end);    } },
        { label: '7 days',     fn: () => { onFrom(todayBali());          onTo(baliOffset(6));            } },
        { label: 'This month', fn: () => { const r = baliMonthRange(0); onFrom(r.start); onTo(r.end);    } },
        ...(extraPresets || []),
    ];
    const handlePreset = e => {
        const p = presets.find(x => x.label === e.target.value);
        if (p) p.fn();
        setTimeout(() => setPresetVal(''), 0);
    };
    return (
        <div className="flex items-center gap-2 mb-4">
            <select value={presetVal} onChange={handlePreset}
                className={SELECT + ' shadow-sm cursor-pointer min-w-[140px]'}>
                <option value="">Quick select…</option>
                {presets.map(p => <option key={p.label} value={p.label}>{p.label}</option>)}
            </select>
            <div className="flex items-center gap-1">
                {navPrev && (
                    <button onClick={navPrev}
                        className="h-9 w-9 flex items-center justify-center bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-slate-800 hover:border-slate-300 shadow-sm transition-all text-xl font-bold leading-none">
                        ‹
                    </button>
                )}
                <div className="flex items-center bg-white border border-slate-200 rounded-xl shadow-sm overflow-visible">
                    <DatePicker
                        value={dateFrom}
                        onChange={v => { onFrom(v); if (v > dateTo) onTo(v); }}
                        rangeFrom={dateFrom} rangeTo={dateTo}
                        align="left"
                    />
                    <span className="text-slate-300 font-bold select-none px-0.5">–</span>
                    <DatePicker
                        value={dateTo}
                        onChange={v => { onTo(v); if (v < dateFrom) onFrom(v); }}
                        rangeFrom={dateFrom} rangeTo={dateTo}
                        align="right"
                    />
                </div>
                {navNext && (
                    <button onClick={navNext}
                        className="h-9 w-9 flex items-center justify-center bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-slate-800 hover:border-slate-300 shadow-sm transition-all text-xl font-bold leading-none">
                        ›
                    </button>
                )}
            </div>
            <div className="flex-1" />
            {loading && <span className="text-[10px] text-blue-500 animate-pulse uppercase tracking-widest">Loading…</span>}
            {trailing}
        </div>
    );
}

// ─── CalendarView ─────────────────────────────────────────────────────────────
function CalendarView() {
    const [data,          setData]          = useState({ boats: [], tours: [] });
    const [loading,       setLoading]       = useState(true);
    const [startDate,     setStartDate]     = useState(() => todayBali());
    const [endDate,       setEndDate]       = useState(() => baliOffset(6));
    const [selectedClass, setSelectedClass] = useState('');
    const [selectedTour,  setSelectedTour]  = useState('');
    const [editItem,      setEditItem]      = useState(null);

    const fetchData = useCallback(async () => {
        setLoading(true);
        try {
            const res  = await fetch(`https://bluuu.tours/api/new/calendar/data?start=${startDate}&end=${endDate}`);
            const json = await res.json();
            setData(json);
        } catch (e) { console.error(e); }
        setLoading(false);
    }, [startDate, endDate]);

    useEffect(() => { fetchData(); }, [fetchData]);

    const days = useMemo(() => {
        const result = [], cur = new Date(startDate + 'T00:00:00'), end = new Date(endDate + 'T00:00:00');
        while (cur <= end) { result.push(fmt(cur)); cur.setDate(cur.getDate() + 1); }
        return result;
    }, [startDate, endDate]);

    const shiftMonth = d => {
        const base = new Date(startDate + 'T00:00:00');
        const r = monthRange(base.getFullYear(), base.getMonth() + d);
        setStartDate(r.start); setEndDate(r.end);
    };
    const visibleTours = useMemo(() =>
        selectedClass ? data.tours.filter(t => t.classes_id === parseInt(selectedClass)) : data.tours,
    [selectedClass, data.tours]);

    const filteredBoats = useMemo(() => {
        let boats = data.boats;
        if (selectedClass) {
            const ids = new Set(data.tours.filter(t => t.classes_id === parseInt(selectedClass)).flatMap(t => t.boat_ids));
            boats = boats.filter(b => ids.has(b.id));
        }
        if (selectedTour) {
            const tour = data.tours.find(t => t.id === parseInt(selectedTour));
            if (tour) boats = boats.filter(b => tour.boat_ids.includes(b.id));
        }
        return boats;
    }, [selectedClass, selectedTour, data]);

    const handleCellClick = (boat, date, records) => {
        if (!records.length) {
            if (confirm(`Block ${boat.name} on ${date}?`)) saveItem({ boat_id: boat.id, date, type: 3 });
        } else {
            setEditItem({ ...records[0], boatName: boat.name, allRecords: records });
        }
    };

    const saveItem = async item => {
        setLoading(true);
        try {
            const url = item.id
                ? `https://bluuu.tours/api/new/calendar/update/${item.id}`
                : `https://bluuu.tours/api/new/calendar/create`;
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...item, key: API_KEY }) });
            if (res.ok) { await fetchData(); setEditItem(null); }
        } catch (e) { alert('Failed'); }
        setLoading(false);
    };

    const deleteItem = async id => {
        if (!confirm('Delete?')) return;
        setLoading(true);
        try {
            const res = await fetch(`https://bluuu.tours/api/new/calendar/delete/${id}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: API_KEY }) });
            if (res.ok) { await fetchData(); setEditItem(null); }
        } catch (e) { alert('Failed'); }
        setLoading(false);
    };

    const selectClass = cls => { setSelectedClass(cls); setSelectedTour(''); };
    const btnCls = (active, color) => `px-4 py-1.5 rounded-lg text-sm font-bold uppercase tracking-wider transition-all border shadow-sm ${active ? color : 'bg-white border-slate-200 text-slate-500 hover:text-slate-800 hover:border-slate-300'}`;

    if (loading && !data.boats.length) return (
        <div className="flex justify-center mt-24 text-blue-500 font-bold animate-pulse tracking-[0.2em] text-sm">LOADING...</div>
    );

    return (
        <div>
            <div className="sticky top-[52px] z-20 bg-slate-100 -mx-4 md:-mx-6 px-4 md:px-6 pt-1 pb-3 mb-5 shadow-[0_3px_10px_rgba(0,0,0,0.07)]">
                <DateRangeBar
                    dateFrom={startDate} dateTo={endDate}
                    onFrom={setStartDate} onTo={setEndDate}
                    navPrev={() => shiftMonth(-1)} navNext={() => shiftMonth(1)}
                    loading={loading}
                />
                {/* Filters */}
                <div className="flex flex-wrap items-center gap-3">
                    <button onClick={() => selectClass('')}  className={btnCls(selectedClass === '',  'bg-slate-800 border-slate-700 text-white')}>All</button>
                    <button onClick={() => selectClass('8')} className={btnCls(selectedClass === '8', 'bg-violet-600 border-violet-500 text-white')}>Private</button>
                    <button onClick={() => selectClass('9')} className={btnCls(selectedClass === '9', 'bg-blue-600 border-blue-500 text-white')}>Shared</button>
                    <select value={selectedTour} onChange={e => setSelectedTour(e.target.value)} className={SELECT + ' min-w-[160px]'}>
                        <option value="">All Tours</option>
                        {visibleTours.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                    <span className="text-[10px] text-slate-400 uppercase tracking-widest">{filteredBoats.length} boats · {days.length} days</span>
                </div>
            </div>

            {/* Grid */}
            <div className={`${GLASS} overflow-hidden`}>
                <div className="overflow-x-auto">
                    <div style={{ display: 'grid', gridTemplateColumns: `190px repeat(${days.length}, minmax(44px, 1fr))`, gap: '1px', background: '#e2e8f0' }}>
                        <div className="sticky left-0 z-10 bg-slate-50 flex flex-col justify-center items-start px-3 py-2 text-xs font-bold text-slate-400 uppercase tracking-tighter border-b border-slate-200 min-h-[44px]">Boat / Date</div>
                        {days.map(d => {
                            const [, mm, dd] = d.split('-');
                            const isToday = d === todayBali();
                            return (
                                <div key={d} className={`flex flex-col justify-center items-center text-xs font-bold border-b border-slate-200 min-h-[44px] min-w-[44px] ${isToday ? 'text-blue-600 bg-blue-50' : 'text-slate-500 bg-slate-50'}`}>
                                    <span>{dd}</span><span className="opacity-50">{mm}</span>
                                </div>
                            );
                        })}
                        {filteredBoats.map(boat => (
                            <React.Fragment key={boat.id}>
                                <div className="sticky left-0 z-10 bg-white flex flex-col justify-center px-3 py-2 border-t border-slate-200 min-h-[44px] min-w-[190px] max-w-[190px] cursor-default">
                                    <div className="truncate text-sm text-slate-700 font-semibold">{boat.name}</div>
                                    <div className="text-[10px] text-slate-400 uppercase tracking-widest">cap {boat.capacity}</div>
                                </div>
                                {days.map(d => {
                                    const records = boat.closed_dates.filter(c => c.date === d);
                                    const primary = records[0];
                                    const pax     = primary?.type === 1 ? records.reduce((s, r) => s + (Number(r.qtty) || 0), 0) : null;
                                    const full    = pax !== null && boat.capacity && pax >= boat.capacity;
                                    const sc      = full ? 'bg-orange-500 text-white' : statusCls(primary?.type);
                                    const lbl     = statusLabel(primary?.type, records, boat.capacity);
                                    return (
                                        <div key={d} onClick={() => handleCellClick(boat, d, records)}
                                            className={`flex flex-col justify-center items-center text-[10px] font-bold border-t border-l border-slate-200 min-h-[44px] min-w-[44px] cursor-pointer transition-colors ${sc}`}>
                                            {lbl}
                                        </div>
                                    );
                                })}
                            </React.Fragment>
                        ))}
                    </div>
                </div>
            </div>

            {/* Legend */}
            <div className="mt-5 flex flex-wrap gap-5 text-xs font-bold uppercase tracking-[0.2em]">
                <span className="text-emerald-600">● Open</span>
                <span className="text-blue-600">● Shared (pax/cap)</span>
                <span className="text-orange-500">● Full</span>
                <span className="text-violet-600">● CRM</span>
                <span className="text-red-500">● Manual Block</span>
                <span className="text-slate-500">● Auto</span>
            </div>

            {/* Modal */}
            {editItem && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm" onClick={() => setEditItem(null)}>
                    <div className="bg-white border border-slate-200 rounded-3xl p-8 max-w-lg w-full shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h2 className="text-xl font-bold text-slate-800">{editItem.boatName}</h2>
                                <p className="text-blue-600 text-xs font-semibold uppercase tracking-widest mt-1">{editItem.date}</p>
                            </div>
                            <button onClick={() => setEditItem(null)} className="p-2 hover:bg-slate-100 rounded-xl text-slate-400 hover:text-slate-700 transition-colors text-xl leading-none">×</button>
                        </div>
                        <div className="space-y-4 max-h-[55vh] overflow-y-auto pr-1">
                            {editItem.allRecords.map((r, i) => (
                                <div key={i} className="p-5 rounded-2xl bg-slate-50 border border-slate-200 space-y-3">
                                    <div className="flex justify-between items-center">
                                        <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Record #{i+1}</span>
                                        <button onClick={() => deleteItem(r.id)} className="text-red-500 hover:text-red-400 p-1 transition-colors text-sm font-bold">✕</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Type</label>
                                            <select className={SELECT + ' w-full'} value={r.type} onChange={e => saveItem({...r, type: e.target.value})}>
                                                <option value="1">Shared</option>
                                                <option value="2">CRM</option>
                                                <option value="3">Manual</option>
                                                <option value="4">Auto</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Qty</label>
                                            <input type="number" className={INPUT + ' w-full'} value={r.qtty || 0} onChange={e => saveItem({...r, qtty: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Kommo ID</label>
                                            <input type="text" className={INPUT + ' w-full'} value={r.lead_id || ''} onChange={e => saveItem({...r, lead_id: e.target.value})} placeholder="—" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase block mb-1">Odoo ID</label>
                                            <input type="text" className={INPUT + ' w-full'} value={r.odoo_id || ''} onChange={e => saveItem({...r, odoo_id: e.target.value})} placeholder="—" />
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {!editItem.allRecords.length && (
                                <div className="text-center py-8 text-slate-400 italic text-sm">No records for this date.</div>
                            )}
                        </div>
                        <div className="mt-6 grid grid-cols-2 gap-3">
                            <button onClick={() => saveItem({ boat_id: editItem.boat_id, date: editItem.date, type: 3 })}
                                className="py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl text-xs uppercase tracking-widest border border-slate-200 transition-colors">
                                + Add Block
                            </button>
                            <button onClick={() => setEditItem(null)}
                                className="py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl text-xs uppercase tracking-widest transition-colors">
                                Done
                            </button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

// ─── OrderDetailModal ─────────────────────────────────────────────────────────
function OrderDetailModal({ order: o, onClose }) {
    const [lines,        setLines]        = useState(null);
    const [linesLoading, setLinesLoading] = useState(false);

    useEffect(() => {
        if (!o?.id) return;
        setLines(null);
        setLinesLoading(true);
        const token = localStorage.getItem(TOKEN_KEY) || '';
        fetch(`/api/admin/odoo/order/${o.id}`, { headers: { Authorization: `Bearer ${token}` } })
            .then(r => r.json())
            .then(json => setLines(Array.isArray(json.odoo?.lines) ? json.odoo.lines : []))
            .catch(() => setLines([]))
            .finally(() => setLinesLoading(false));
    }, [o?.id]);

    if (!o) return null;
    const priv    = isPrivate(o);
    const name    = partnerName(o);
    const email   = o.odoo_email || null;
    const phone   = o.odoo_phone || null;
    const lunch   = (o.x_studio_lunch_restaurant && o.x_studio_lunch_restaurant !== false ? String(o.x_studio_lunch_restaurant) : null)
                 || (o.x_studio_lunch_resto      && o.x_studio_lunch_resto      !== false ? String(o.x_studio_lunch_resto)      : null);
    const extras  = Array.isArray(o.local_extras) ? o.local_extras : [];
    const collect = Number(o.x_studio_collect ?? 0);

    const Sec = ({ title, children }) => (
        <div>
            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 pb-1 border-b border-slate-100">{title}</div>
            <div className="space-y-1.5">{children}</div>
        </div>
    );
    const Row = ({ label, value, cls }) => {
        if (value === null || value === undefined || value === false || value === '') return null;
        return (
            <div className="flex gap-2">
                <span className="text-xs text-slate-400 w-24 shrink-0">{label}</span>
                <span className={`text-xs text-slate-700 font-medium ${cls || ''}`}>{value}</span>
            </div>
        );
    };

    const guides = [o.x_studio_guide_1_1, o.x_studio_guide_2_1].filter(v => v && v !== false).join(' / ') || null;

    return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm" onClick={onClose}>
            <div className="bg-white border border-slate-200 rounded-3xl p-6 max-w-xl w-full shadow-2xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                {/* Header */}
                <div className="flex justify-between items-start mb-5">
                    <div>
                        <div className="flex items-center gap-2 mb-1">
                            <span className="text-xl font-bold text-slate-800">{o.name}</span>
                            {o.x_studio_tour_type && o.x_studio_tour_type !== false && (
                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-widest ${priv ? 'bg-violet-100 text-violet-600' : 'bg-blue-100 text-blue-600'}`}>
                                    {o.x_studio_tour_type}
                                </span>
                            )}
                        </div>
                        <div className="text-xs text-slate-400 font-mono">
                            #{o.id}{o.client_order_ref ? ` · ${o.client_order_ref}` : ''}
                            {o.local_id ? ` · local #${o.local_id}` : ''}
                        </div>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                        <a href={`https://pt-day-trip-bali.odoo.com/odoo/rental/${o.id}`} target="_blank" rel="noopener"
                            className="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded-xl transition-colors uppercase tracking-wider whitespace-nowrap">
                            Odoo ↗
                        </a>
                        <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-xl text-slate-400 hover:text-slate-700 transition-colors text-xl leading-none">×</button>
                    </div>
                </div>

                <div className="space-y-5">
                    <Sec title="Tour">
                        <Row label="Date" value={fmtOdooDate(o.rental_start_date)} />
                        <Row label="Boat" value={o.x_studio_boat_name} cls={priv ? 'text-violet-600' : 'text-blue-600'} />
                        <Row label="Tour" value={o.x_studio_route && o.x_studio_route !== false ? String(o.x_studio_route) : null} />
                        <Row label="Guides" value={guides} />
                        <Row label="Lunch" value={lunch} />
                    </Sec>

                    <Sec title="People">
                        <Row label="Adults" value={String(o.x_studio_adults ?? 0)} />
                        <Row label="Kids" value={String(o.x_studio_kids ?? 0)} />
                    </Sec>

                    <Sec title="Finance">
                        <Row label="Total" value={`${fmtMoney(o.amount_total)} IDR`} />
                        <Row label="Deposit" value={`${fmtMoney(o.x_studio_deposit)} IDR`} />
                        {collect > 0 && <Row label="Collect" value={`${fmtMoney(o.x_studio_collect)} IDR`} cls="text-amber-600 font-bold" />}
                        {o.x_studio_payment_source && o.x_studio_payment_source !== false && <Row label="Payment" value={String(o.x_studio_payment_source)} />}
                        {o.x_studio_source && o.x_studio_source !== false && <Row label="Source" value={String(o.x_studio_source)} />}
                    </Sec>

                    {(o.x_studio_car_type || o.x_studio_pickup_address || o.x_studio_drop_off_address) && (
                        <Sec title="Transfer">
                            {o.x_studio_car_type && o.x_studio_car_type !== false && <Row label="Car" value={String(o.x_studio_car_type)} />}
                            <Row label="Pickup" value={o.x_studio_pickup_address} />
                            <Row label="Dropoff" value={o.x_studio_drop_off_address} />
                        </Sec>
                    )}

                    {extras.length > 0 && (
                        <Sec title="Extras">
                            {extras.map((ex, i) => (
                                <div key={i} className="flex justify-between text-xs">
                                    <span className="text-slate-700">{ex.name} ×{ex.qty}</span>
                                    <span className="text-slate-400">{fmtMoney(ex.price * ex.qty)} IDR</span>
                                </div>
                            ))}
                        </Sec>
                    )}

                    {o.x_studio_special_requests && (
                        <Sec title="Special Requests">
                            <p className="text-xs text-slate-700 whitespace-pre-line">{o.x_studio_special_requests}</p>
                        </Sec>
                    )}

                    <Sec title="Contact">
                        <Row label="Name" value={name} />
                        {email && (
                            <div className="flex gap-2">
                                <span className="text-xs text-slate-400 w-24 shrink-0">Email</span>
                                <a href={`mailto:${email}`} className="text-xs text-blue-600 hover:text-blue-500 transition-colors break-all">{email}</a>
                            </div>
                        )}
                        {phone && (
                            <div className="flex gap-2">
                                <span className="text-xs text-slate-400 w-24 shrink-0">WhatsApp</span>
                                <a href={`https://wa.me/${phone.replace(/\D/g,'')}`} target="_blank" className="text-xs text-green-600 hover:text-green-500 transition-colors">{phone}</a>
                            </div>
                        )}
                    </Sec>

                    <Sec title="Products">
                        {linesLoading && (
                            <div className="text-xs text-blue-500 animate-pulse uppercase tracking-widest py-1">Loading…</div>
                        )}
                        {!linesLoading && lines && lines.length === 0 && (
                            <div className="text-xs text-slate-400 italic">No product lines</div>
                        )}
                        {!linesLoading && lines && lines.length > 0 && (
                            <div className="divide-y divide-slate-100 -mx-1">
                                {lines.map(l => {
                                    const qty   = Number(l.product_uom_qty ?? 0);
                                    const price = Number(l.price_unit ?? 0);
                                    const total = qty * price;
                                    return (
                                        <div key={l.id} className="flex items-start justify-between gap-2 px-1 py-1.5">
                                            <div className="min-w-0">
                                                <div className="text-xs text-slate-700 font-medium leading-tight">{l.name}</div>
                                                {qty > 1 && (
                                                    <div className="text-[10px] text-slate-400 mt-0.5">×{qty} @ {fmtMoney(price)}</div>
                                                )}
                                            </div>
                                            <div className="text-xs text-slate-600 font-semibold shrink-0 tabular-nums">
                                                {total > 0 ? fmtMoney(total) : <span className="text-slate-300">—</span>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </Sec>
                </div>
            </div>
        </div>
    );
}

// ─── LeadsTable ───────────────────────────────────────────────────────────────

// ─── LeadsView ────────────────────────────────────────────────────────────────
function LeadsView() {
    const token                     = localStorage.getItem(TOKEN_KEY) || '';
    const [dateFrom,   setDateFrom] = useState(todayBali);
    const [dateTo,     setDateTo]   = useState(todayBali);
    const [data,       setData]     = useState(null);
    const [loading,    setLoading]  = useState(false);
    const [error,      setError]    = useState('');
    const [detail,      setDetail]    = useState(null);
    const [showTotals,  setShowTotals] = useState(false);
    const [filters,     setFilters]   = useState({ tour: '', boat: '', transfer: '', type: '' });
    const load = useCallback(async (from, to) => {
        setLoading(true);
        setError('');
        try {
            const res  = await fetch(`/api/admin/leads?date_from=${from}&date_to=${to}`, {
                headers: { Authorization: `Bearer ${token}` }
            });
            const json = await res.json();
            if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
            setData(json);
            setDetail(null);
            setFilters({ tour: '', boat: '', transfer: '', type: '' });
        } catch (e) {
            setError(e.message);
        } finally {
            setLoading(false);
        }
    }, [token]);

    useEffect(() => { load(dateFrom, dateTo); }, [dateFrom, dateTo]);

    const filtered = useMemo(() => {
        if (!data) return [];
        return data.orders.filter(o => {
            if (filters.tour     && (o.x_studio_route && o.x_studio_route !== false ? String(o.x_studio_route) : '') !== filters.tour) return false;
            if (filters.boat     && (o.x_studio_boat_name || '') !== filters.boat)                                                        return false;
            if (filters.transfer && (o.x_studio_car_type && o.x_studio_car_type !== false ? String(o.x_studio_car_type) : '') !== filters.transfer) return false;
            if (filters.type     && (o.x_studio_tour_type || '') !== filters.type)                                                        return false;
            return true;
        });
    }, [data, filters]);

    const tours     = useMemo(() => data ? [...new Set(data.orders.map(o => o.x_studio_route && o.x_studio_route !== false ? String(o.x_studio_route) : '').filter(Boolean))].sort() : [], [data]);
    const boats     = useMemo(() => data ? [...new Set(data.orders.map(o => o.x_studio_boat_name).filter(Boolean))].sort() : [], [data]);
    const transfers = useMemo(() => data ? [...new Set(data.orders.map(o => o.x_studio_car_type && o.x_studio_car_type !== false ? String(o.x_studio_car_type) : '').filter(Boolean))].sort() : [], [data]);
    const types     = useMemo(() => data ? [...new Set(data.orders.map(o => o.x_studio_tour_type || '').filter(Boolean))].sort() : [], [data]);
    const hasFilter = filters.tour || filters.boat || filters.transfer || filters.type;

    return (
        <div>
            <div className="sticky top-[52px] z-20 bg-slate-100 -mx-4 md:-mx-6 px-4 md:px-6 pt-1 pb-1 shadow-[0_3px_10px_rgba(0,0,0,0.07)]">
                <DateRangeBar
                    dateFrom={dateFrom} dateTo={dateTo}
                    onFrom={setDateFrom} onTo={setDateTo}
                    extraPresets={[{ label: 'Next month', fn: () => { const r = baliMonthRange(1); setDateFrom(r.start); setDateTo(r.end); } }]}
                    trailing={
                        <>
                            <button onClick={() => setShowTotals(v => !v)}
                                className={`h-9 px-3 flex items-center border rounded-lg text-sm font-bold uppercase tracking-wider transition-all shadow-sm ${showTotals ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-500 hover:text-slate-800'}`}>
                                Totals
                            </button>
                            <button onClick={() => load(dateFrom, dateTo)} disabled={loading}
                                className="h-9 w-9 flex items-center justify-center bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-slate-800 shadow-sm transition-all disabled:opacity-40 text-base">
                                ↺
                            </button>
                        </>
                    }
                    loading={loading}
                />
            </div>

            {error && (
                <div className="mb-4 rounded-2xl border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-600">{error}</div>
            )}
            {loading && (
                <div className="flex justify-center mt-16 text-blue-500 font-bold animate-pulse tracking-[0.2em] text-sm">LOADING FROM ODOO...</div>
            )}
            {!loading && data && (
                <div className={GLASS + ' overflow-hidden'}>
                    {showTotals
                        ? <TotalsView orders={filtered} />
                        : filtered.length === 0
                            ? <div className="py-16 text-center text-sm text-slate-400">No orders for {fmtDisplayDate(dateFrom)}{dateFrom !== dateTo ? ` — ${fmtDisplayDate(dateTo)}` : ''}</div>
                            : <LeadsTable orders={filtered} onRow={setDetail} />
                    }
                    <div className="flex flex-wrap items-center gap-2 px-4 py-3 border-t border-slate-200 bg-slate-50">
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mr-1">Filter:</span>
                        <select className={SELECT} value={filters.tour} onChange={e => setFilters(f => ({...f, tour: e.target.value}))}>
                            <option value="">All tours</option>
                            {tours.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        <select className={SELECT} value={filters.boat} onChange={e => setFilters(f => ({...f, boat: e.target.value}))}>
                            <option value="">All boats</option>
                            {boats.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>
                        <select className={SELECT} value={filters.transfer} onChange={e => setFilters(f => ({...f, transfer: e.target.value}))}>
                            <option value="">All transfers</option>
                            {transfers.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        <select className={SELECT} value={filters.type} onChange={e => setFilters(f => ({...f, type: e.target.value}))}>
                            <option value="">All types</option>
                            {types.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        {hasFilter && (
                            <button onClick={() => setFilters({ tour: '', boat: '', transfer: '', type: '' })}
                                className="text-[10px] text-red-500 hover:text-red-400 font-bold uppercase tracking-widest px-2 transition-colors">
                                Clear
                            </button>
                        )}
                        <div className="flex-1" />
                        <span className="text-xs text-slate-400 uppercase tracking-widest">
                            Showing {filtered.length} of {data.total} entries
                        </span>
                    </div>
                </div>
            )}
            {detail && <OrderDetailModal order={detail} onClose={() => setDetail(null)} />}
        </div>
    );
}

// ─── TotalsView ───────────────────────────────────────────────────────────────
function TotalsView({ orders }) {
    const byType = {}, byBoat = {};
    let totalPax = 0;

    orders.forEach(o => {
        const pax = Number(o.x_studio_count_of_people || (Number(o.x_studio_adults || 0) + Number(o.x_studio_kids || 0)));
        totalPax += pax;
        const type = o.x_studio_tour_type && o.x_studio_tour_type !== false ? String(o.x_studio_tour_type) : 'Unknown';
        byType[type] = { pax: (byType[type]?.pax || 0) + pax, orders: (byType[type]?.orders || 0) + 1 };
        const boat = o.x_studio_boat_name || 'Unknown';
        byBoat[boat] = { pax: (byBoat[boat]?.pax || 0) + pax, orders: (byBoat[boat]?.orders || 0) + 1 };
    });

    const Bar = ({ pax, max, cls }) => (
        <div className="flex-1 bg-slate-100 rounded-full h-1.5 overflow-hidden">
            <div className={`h-full rounded-full ${cls}`} style={{width: `${max ? Math.round(pax / max * 100) : 0}%`}} />
        </div>
    );

    const typeEntries = Object.entries(byType).sort((a, b) => b[1].pax - a[1].pax);
    const boatEntries = Object.entries(byBoat).sort((a, b) => b[1].pax - a[1].pax);
    const maxBoatPax  = boatEntries[0]?.[1]?.pax || 1;

    return (
        <div className="p-6 space-y-6">
            <div className="flex items-center gap-6">
                <div>
                    <div className="text-3xl font-bold text-slate-800">{totalPax}</div>
                    <div className="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5">Total pax</div>
                </div>
                <div>
                    <div className="text-3xl font-bold text-slate-800">{orders.length}</div>
                    <div className="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5">Orders</div>
                </div>
            </div>

            <div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 pb-1 border-b border-slate-100">By Tour Type</div>
                <div className="space-y-2">
                    {typeEntries.map(([type, { pax, orders: cnt }]) => {
                        const priv = type.toLowerCase().includes('private');
                        return (
                            <div key={type} className="flex items-center gap-3">
                                <span className={`text-xs font-bold px-2 py-0.5 rounded-full uppercase tracking-widest w-28 text-center shrink-0 ${priv ? 'bg-violet-100 text-violet-600' : 'bg-blue-100 text-blue-600'}`}>{type}</span>
                                <Bar pax={pax} max={totalPax} cls={priv ? 'bg-violet-400' : 'bg-blue-400'} />
                                <span className="text-sm font-bold text-slate-700 w-10 text-right shrink-0">{pax}</span>
                                <span className="text-xs text-slate-400 w-20 shrink-0">{cnt} orders · {totalPax ? Math.round(pax / totalPax * 100) : 0}%</span>
                            </div>
                        );
                    })}
                </div>
            </div>

            <div>
                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 pb-1 border-b border-slate-100">By Boat</div>
                <div className="space-y-2">
                    {boatEntries.map(([boat, { pax, orders: cnt }]) => (
                        <div key={boat} className="flex items-center gap-3">
                            <span className="text-sm text-slate-700 font-medium w-36 truncate shrink-0">{boat}</span>
                            <Bar pax={pax} max={maxBoatPax} cls="bg-emerald-400" />
                            <span className="text-sm font-bold text-slate-700 w-10 text-right shrink-0">{pax}</span>
                            <span className="text-xs text-slate-400 w-20 shrink-0">{cnt} orders · {totalPax ? Math.round(pax / totalPax * 100) : 0}%</span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
    const [activeTab, setActiveTab] = useState('leads');

    const tabs = [
        { id: 'calendar', label: 'Calendar' },
        { id: 'leads',    label: 'Leads'    },
    ];

    return (
        <div>
            <div className="sticky top-0 z-30 bg-slate-100 -mx-4 md:-mx-6 px-4 md:px-6 py-3 flex gap-1 border-b border-slate-200/80">
                {tabs.map(tab => (
                    <button key={tab.id}
                        onClick={() => !tab.disabled && setActiveTab(tab.id)}
                        className={`px-4 py-1.5 rounded-lg text-sm font-bold uppercase tracking-wider transition-all border ${
                            activeTab === tab.id
                                ? 'bg-slate-800 border-slate-700 text-white'
                                : tab.disabled
                                    ? 'bg-white border-slate-200 text-slate-300 cursor-not-allowed'
                                    : 'bg-white border-slate-200 text-slate-500 hover:text-slate-800 hover:border-slate-300 shadow-sm'
                        }`}>
                        {tab.label}
                    </button>
                ))}
            </div>
            {activeTab === 'calendar' && <CalendarView />}
            {activeTab === 'leads'    && <LeadsView />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
